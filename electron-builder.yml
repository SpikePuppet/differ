appId: com.differ.app
productName: Differ
copyright: Copyright © 2026
directories:
  output: dist
  buildResources: build
files:
  - out/main/**
  - out/preload/**
  - out/renderer/**
  - build/**
  - package.json
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  icon: build/icon.icns
win:
  target:
    - nsis
  icon: build/icon.ico
linux:
  target:
    - AppImage
  icon: build/icon.png

# Ensure native modules are rebuilt for Electron's Node runtime during packaging
npmRebuild: true
