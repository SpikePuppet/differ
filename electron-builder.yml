appId: dev.differ.review
productName: Differ
copyright: Copyright © 2026
directories:
  output: dist
  buildResources: build
files:
  - out/main/**
  - out/preload/**
  - out/renderer/**
  - package.json
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
win:
  target:
    - nsis
linux:
  target:
    - AppImage

# Ensure native modules are rebuilt for Electron's Node runtime during packaging
npmRebuild: true
